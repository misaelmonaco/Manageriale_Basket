services:
  postgres:
    image: postgres:16-alpine
    container_name: basket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: basket
      POSTGRES_PASSWORD: basket
      POSTGRES_DB: basket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U basket -d basket"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - apps/api/.env.example
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    env_file:
      - apps/web/.env.example
    ports:
      - "3000:3000"

volumes:
  postgres_data:
